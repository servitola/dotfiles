fail_fast: true
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-yaml
        exclude: ^claude-code/skills/.+/templates/.+\.ya?ml$
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: lint-keyboard-layout
        name: Lint Hammerspoon keyboard layout files
        entry: .git-hooks/lint-keyboard-layout.sh
        language: system
        files: ^hammerspoon/Spoons/HotKeys\.spoon/layout/60%/.*\.lua$
        stages: [pre-commit]
      - id: lint-skill-frontmatter
        name: Validate Claude Code skill frontmatter
        entry: .git-hooks/lint-skill-frontmatter.sh
        language: system
        files: ^claude-code/skills/[^/]+/SKILL\.md$
        stages: [pre-commit]
      - id: ensure-agents-symlinks
        name: Ensure AGENTS.md has CLAUDE.md / WARP.md symlinks
        entry: .git-hooks/ensure-agents-symlinks.sh
        language: system
        files: (^|/)AGENTS\.md$
        stages: [pre-commit]
      - id: lint-shell
        name: Lint shell scripts (zsh -n / shellcheck by shebang)
        entry: .git-hooks/lint-shell.sh
        language: system
        files: (\.sh$|^zsh/bin/[^/.]+$)
        stages: [pre-commit]
