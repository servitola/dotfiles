apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: {{SERVICE_NAME}}
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/execution-environment: gen2
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '0'
        autoscaling.knative.dev/maxScale: '10'
    spec:
      # TODO: create SA with roles/run.invoker, roles/artifactregistry.reader
      # and any service-specific roles, then put its email here.
      serviceAccountName: TODO-fill-service-account@{{PROJECT_ID}}.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - name: app
          image: app  # replaced by Cloud Deploy from cloudbuild --images=app=...
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: '1'
              memory: 512Mi
          env:
            # TODO: add service env vars; secrets via secretKeyRef from Secret Manager
            - name: LOG_LEVEL
              value: 'info'
  traffic:
    - percent: 100
      latestRevision: true
