services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./redact_secrets.py:/app/redact_secrets.py:ro
      - ./tts_voice_rewriter.py:/app/tts_voice_rewriter.py:ro
    environment:
      OPENROUTER_API_KEY: ${OPEN_ROUTER_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      NVIDIA_API_KEY: ${NVIDEA_API_KEY}
      GITHUB_MODELS_TOKEN: ${GITHUB_API_TOKEN}
      ZAI_API_KEY: ${ZAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY}
      SAMBANOVA_API_KEY: ${SAMBANOVA_API_KEY}
      CHUTES_API_KEY: ${CHUTES_API_KEY}
      AZURE_VOICE_TTS_GREEK_API_KEY1: ${AZURE_VOICE_TTS_GREEK_API_KEY1}
      LITELLM_MASTER_KEY: sk-local-workbot
      DATABASE_URL: postgresql://litellm:litellm@db:5432/litellm
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      PYTHONPATH: /app
      UI_USERNAME: ${LITELLM_UI_USERNAME:?set LITELLM_UI_USERNAME in ~/.config/openai_key.sh}
      UI_PASSWORD: ${LITELLM_UI_PASSWORD:?set LITELLM_UI_PASSWORD in ~/.config/openai_key.sh}
      OLLAMA_API_BASE: http://host.docker.internal:11434
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness', timeout=3); sys.exit(0)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - default
      - mesh

  db:
    image: postgres:16-alpine
    container_name: litellm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  redis:
    image: redis/redis-stack-server:latest
    container_name: litellm-redis
    restart: unless-stopped
    command:
      [
        "redis-stack-server",
        "--save", "60", "1",
        "--maxmemory", "256mb",
        "--maxmemory-policy", "allkeys-lru",
      ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - default

volumes:
  postgres_data:
    name: litellm_postgres_data
  redis_data:
    name: litellm_redis_data

networks:
  mesh:
    name: ai-mesh
    external: true
