services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    # No healthcheck: qdrant's official image is distroless — ships no sh/wget/curl.
    # `rag status` polls http://localhost:6333/healthz from the host instead.

volumes:
  qdrant_data:
    name: qdrant_data
    external: true
