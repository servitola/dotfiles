# rag refresh config — collection:path1 path2 ...
# Used by `rag refresh` and `up` alias (via update_all.sh).
# Paths expanded via zsh, so ~, globs and env vars work.
# Comments and empty lines ignored.
#
# Add new collections here — `up` will keep them fresh.
# Private collections (not for git) go in rag.private.conf (gitignored).

dotfiles: ~/projects/dotfiles --exclude /annepro2/ --exclude /images/ --exclude /karabiner/karabiner.json --exclude /karabiner/automatic_backups/ --exclude /chromium-ImprovedTube-extension/ --exclude /adguard/ --exclude /jetbrains --exclude /dotfiles/.claude/ --exclude /claude-code/projects --exclude /claude-code/file-history/ --exclude /claude-code/paste-cache/ --exclude /claude-code/shell-snapshots/ --exclude /claude-code/cache/ --exclude /claude-code/backups/ --exclude /claude-code/downloads/ --exclude /claude-code/ide/ --exclude /claude-code/session-env/ --exclude /claude-code/sessions/ --exclude /claude-code/telemetry/ --exclude /claude-code/tasks/ --exclude /claude-code/plans/ --exclude /claude-code/plugins/ --exclude /claude-code/history.jsonl --exclude /claude-code/mcp-needs-auth-cache.json --exclude /agent-of-empires/ --exclude .aider --exclude /zsh/p10k.zsh --exclude /macos/wallpapers-blocklist.txt --exclude /HotKeys.spoon/old/ --exclude /rag/rag.eval --exclude /rag/rag-gaps.md --exclude /rag/gaps/ --exclude /rag/rag-eval-history.md --exclude /rag/rag-answer-eval-history.md --exclude /rag/rag-retired.md --exclude /rag/logs/

workbot2: ~/projects/workbot2 --exclude .build --exclude .vscode
spotware-dev-docs: ~/projects/workbot-docs --exclude /REDACTED-REPO/
services: ~/projects/services --exclude node_modules --exclude .venv --exclude temp --exclude transcriptions

sphere: ~/projects/sphere
glasswings: ~/projects/glasswings
