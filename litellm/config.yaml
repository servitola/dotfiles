# LiteLLM → free model providers (OpenRouter / Groq / NVIDIA NIM / GitHub / Z.AI / Mistral / Gemini)

model_list:

  # NVIDIA Nemotron 3 Super 120B — hybrid Mamba-Transformer, 262k context.
  # Fast (~4s), honest routing, good at reasoning / planning.
  - model_name: nemotron
    litellm_params:
      model: openai/nvidia/nemotron-3-super-120b-a12b:free
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0

  # OpenAI gpt-oss 120B — open-weight MoE, 131k context.
  # Fastest in the free pool (~3s), solid tool-use, stable routing.
  # Repointed to native providers 2026-07-22 — OpenRouter pulled the :free
  # slug. Two deployments = intra-alias rotation, not a cross-group fallback,
  # so it still honours the "direct names don't fall back" policy below.
  - model_name: gpt
    litellm_params:
      model: groq/openai/gpt-oss-120b
      api_key: os.environ/GROQ_API_KEY
      order: 1
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0
  - model_name: gpt
    litellm_params:
      model: openai/gpt-oss-120b
      api_base: https://api.cerebras.ai/v1
      api_key: os.environ/CEREBRAS_API_KEY
      order: 2
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0

  # Z.AI GLM-4.7-Flash — 31.2B MoE (3B active), 202k context.
  # Native Z.AI provider, free tier. Strong tool-use, vision, coding.
  - model_name: glm
    litellm_params:
      model: zai/glm-4.7-flash
      api_key: os.environ/ZAI_API_KEY
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0

  # `deepseek` direct alias dropped 2026-06-02. OpenRouter pulled every
  # DeepSeek `:free` slug, and the NIM v4-flash/v4-pro endpoints hang on
  # inference (slug appears in /v1/models but completions time out). For
  # DeepSeek-class reasoning use `nvidia-deepseek` / `sambanova-deepseek`
  # or the `reasoning` rotation group.
  # (`nvidia-kimi` removed 2026-07-22: NIM still LISTS moonshotai/kimi-k2.6 but
  # calling it 404s "Function '<uuid>': Not found for account". A catalog can't
  # see that — which is why smoke-test.py exists next to check-models.py.)

  # Rebuilt 2026-07-22 — both old members (Dolphin Venice, Hermes 3) were
  # pulled from OpenRouter's free tier.
  # CAVEAT: these are lightly-filtered *general* models, not abliterated
  # fine-tunes — they will still refuse hard requests. No genuinely uncensored
  # model is left on any free tier we can reach (checked OpenRouter's whole
  # free catalog, io.net, NIM, Cloudflare). Alias kept: consumer contract.
  - model_name: uncensored
    litellm_params:
      model: openai/mistralai/Mistral-Nemo-Instruct-2407
      api_base: https://api.intelligence.io.solutions/api/v1
      api_key: os.environ/IONET_API_KEY
      timeout: 60
      order: 1
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0
  - model_name: uncensored
    litellm_params:
      model: mistral/mistral-small-latest
      api_key: os.environ/MISTRAL_API_KEY
      timeout: 90
      order: 2
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0

  # Vision pool — multimodal models under one name for reliability on
  # image tasks. Shuffle is justified here because vision models rarely
  # overlap in capabilities and rate limits park them in cooldown often.
  # EVERY member MUST accept image_url content — a text-only model here
  # hard-400s and takes down ~1/N of shuffled calls (see gemini block below).
  - model_name: vision
    litellm_params:
      model: openai/nvidia/nemotron-nano-12b-v2-vl:free
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0
  - model_name: vision
    litellm_params:
      model: openai/google/gemma-4-31b-it:free
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0
  - model_name: vision
    litellm_params:
      model: openai/google/gemma-4-26b-a4b-it:free
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0
  # gemini-flash-lite in the pool: clean multimodal, no reasoning-token
  # burn (reasoning_effort: low), reliable when OpenRouter :free hits daily
  # caps. Replaced zai/glm-4.7-flash here 2026-07-14 — that model is
  # TEXT-ONLY and hard-400s on images ("content.type invalid, allowed
  # values: ['text']"), so ~1/4 of shuffled vision calls failed. glm-4.7
  # stays available via its own text aliases.
  - model_name: vision
    litellm_params:
      model: gemini/gemini-2.5-flash-lite
      api_key: os.environ/GEMINI_API_KEY
      reasoning_effort: low
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0
  # Z.AI GLM-4.6V-Flash — vision-capable sibling of glm-4.7-flash (that one is
  # TEXT-ONLY and 400s on images; don't swap them). The only `vision` member
  # that is neither OpenRouter nor Gemini — without it the group is 0 live
  # whenever those two are quota-capped. Free tier is contended (429 code 1305).
  # glm-4.6v (non-flash) is NOT free — "Insufficient balance".
  # No `order:` on any vision member — strict tiers would leave this one
  # unreachable exactly when it's needed. Same lesson as `tts`.
  - model_name: vision
    litellm_params:
      model: zai/glm-4.6v-flash
      api_key: os.environ/ZAI_API_KEY
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0

  # OCR — removed 2026-05-16: baidu/qianfan-ocr-fast:free pulled from
  # OpenRouter and no free OCR-tuned replacement is currently available.
  # Use the `vision` rotation for image text extraction until a dedicated
  # OCR model returns.

  # Embeddings for local RAG / Qdrant. 2048-dim.
  # On NIM, not OpenRouter: RAG's ~9k embeds/day drained the shared OpenRouter
  # daily bucket and 429'd every other :free model. See AGENTS.md.
  # Same model on both, cosine 1.000000 — the OpenRouter slug
  # (`…embed-vl-1b-v2:free`) is a drop-in spare. A DIFFERENT model is not:
  # changing model or dim invalidates every Qdrant collection.
  - model_name: embed
    litellm_params:
      model: openai/nvidia/llama-nemotron-embed-vl-1b-v2
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
      # Both params below are load-bearing — don't drop either:
      #   input_type: `passage` scores 0.637 vs stored vectors, `query` 1.000
      #   encoding_format: omit it and the OpenAI SDK sends base64, which
      #                    NVIDIA rejects → 400 on every call
      # (NIM also 400s on OpenRouter's `extra_body.provider` key.)
      input_type: query
      encoding_format: float
      num_retries: 3
      timeout: 90
    model_info:
      mode: embedding   # else /health probes it as chat and reports false-dead
      input_cost_per_token: 0
      output_cost_per_token: 0

  # === New OpenRouter :free (discovered 2026-06-07 via check-models --discover) ==
  # NVIDIA Nemotron 3 Ultra 550B-A55B — flagship free reasoner, upgrade over
  # the 120b super. Big → can be slow; reasoning model (emits <think>).
  - model_name: nemotron-ultra
    litellm_params:
      model: openai/nvidia/nemotron-3-ultra-550b-a55b:free
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 120
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0
  # NVIDIA Nemotron 3 Nano Omni 30B-A3B reasoning — fast multimodal-ish reasoner.
  - model_name: nemotron-omni
    litellm_params:
      model: openai/nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0
  # Poolside Laguna M.1 — coding-focused model, free on OpenRouter.
  - model_name: poolside-laguna
    litellm_params:
      model: openai/poolside/laguna-m.1:free
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0
  # (glm-air removed 2026-07-01: OpenRouter dropped the `:free` variant of every
  # z-ai/glm slug — no free GLM on OpenRouter anymore. Native `glm` (zai key,
  # zai/glm-4.7-flash) covers GLM.)
  # OpenAI gpt-oss 20B — lighter/faster sibling of the 120b.
  - model_name: gpt-oss-20b
    litellm_params:
      model: openai/openai/gpt-oss-20b:free
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0

  # === New OpenRouter :free (discovered 2026-06-23 via check-models --discover) ==
  # Cohere North Mini Code — coding-focused model. Verified live 2026-06-23
  # (200, $0). NOTE: it's a *reasoning* model — emits chain-of-thought into the
  # `reasoning` field and only fills `content` after it finishes thinking, so
  # callers need a generous max_tokens or `content` comes back empty
  # (finish_reason=length). require_parameters pins routing to param-compatible
  # backends (avoids the intermittent-400 trap).
  - model_name: cohere-north-code
    litellm_params:
      model: openai/cohere/north-mini-code:free
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 90
      extra_body:
        provider:
          require_parameters: true
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0

  # === New OpenRouter :free (discovered 2026-07-01 via check-models) ==========
  # NVIDIA Nemotron Nano 9B v2 — compact general/reasoning model, sibling of the
  # bigger nemotron-* aliases. Slug validated live (routes; a 200 could not be
  # captured on add-day because the account's shared OpenRouter free-per-day
  # quota was exhausted — 429, not a config fault). require_parameters pins
  # routing to param-compatible backends.
  - model_name: nemotron-nano
    litellm_params:
      model: openai/nvidia/nemotron-nano-9b-v2:free
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 90
      extra_body:
        provider:
          require_parameters: true
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0
  # NVIDIA Nemotron 3.5 Content-Safety — guard/moderation classifier (Llama-Guard
  # style). Fills a capability gap (no moderation lane existed). Expects a
  # content-to-classify prompt; returns a safety verdict, not free chat. Slug
  # validated live (routes; 429 quota on add-day — verify a 200 after the daily
  # OpenRouter free quota resets, ~00:00 UTC).
  - model_name: moderation
    litellm_params:
      model: openai/nvidia/nemotron-3.5-content-safety:free
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 90
      extra_body:
        provider:
          require_parameters: true
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0

  # === Groq direct (free: 30 RPM / 6K TPM / 14 400 RPD) ===
  # `groq/` prefix — LiteLLM has native provider integration for Groq,
  # so no need for the `openai/<slug>` + api_base workaround. Kept for
  # A/B comparison with Workbot's AIProvider.groq which runs the same
  # upstream via crush instead of LiteLLM.
  - model_name: groq-llama
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0
  - model_name: groq-gpt-oss
    litellm_params:
      model: groq/openai/gpt-oss-120b
      api_key: os.environ/GROQ_API_KEY
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0
  - model_name: groq-compound
    litellm_params:
      model: groq/groq/compound
      api_key: os.environ/GROQ_API_KEY
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0

  # === NVIDIA NIM direct (free 1000-5000 credits, 40 RPM) ===
  # Different from the OpenRouter-proxied `nemotron` above: this hits
  # build.nvidia.com directly, no middleman cooldowns, but separate
  # quota pool.
  - model_name: nvidia-nemotron
    litellm_params:
      # 49B v1 was EOL 2026-04-15 → v1.5 is the current snapshot;
      # tuned for agentic workflows, used as default for this alias.
      model: openai/nvidia/llama-3.3-nemotron-super-49b-v1.5
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0
  - model_name: nvidia-nemotron-120b
    litellm_params:
      # 120B Mamba-Transformer hybrid flagship for heavier reasoning.
      model: openai/nvidia/nemotron-3-super-120b-a12b
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0
  - model_name: nvidia-deepseek
    litellm_params:
      # v3.2 retired on NIM; v4-pro is the current flagship.
      model: openai/deepseek-ai/deepseek-v4-pro
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0
  - model_name: nvidia-deepseek-flash
    litellm_params:
      # Lighter v4 sibling — faster, still 1M context.
      model: openai/deepseek-ai/deepseek-v4-flash
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0

  # === GitHub Models (free 10-15 RPM / 50-150 RPD) ===
  # Tiny quota — only useful for smoke tests, not continuous pipeline.
  # PAT with `models:read` scope required.
  - model_name: github-gpt4o-mini
    litellm_params:
      model: openai/openai/gpt-4o-mini
      api_base: https://models.github.ai/inference
      api_key: os.environ/GITHUB_MODELS_TOKEN
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0
  - model_name: github-deepseek-r1
    litellm_params:
      model: openai/deepseek/DeepSeek-R1
      api_base: https://models.github.ai/inference
      api_key: os.environ/GITHUB_MODELS_TOKEN
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0

  # === Mistral direct (free: ~1 RPS, 500K TPM, ~1B tokens/month) ============
  # Phone verification required. OpenAI-compatible endpoint. Free tier
  # requires data-training opt-in for prompts outside EU/EEA/UK.
  - model_name: mistral-codestral
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0
  - model_name: mistral-small
    litellm_params:
      model: mistral/mistral-small-latest
      api_key: os.environ/MISTRAL_API_KEY
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0
  - model_name: mistral-large
    litellm_params:
      model: mistral/mistral-large-latest
      api_key: os.environ/MISTRAL_API_KEY
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0

  # === Gemini direct (free: 10 RPM / 250 RPD Flash, 500 RPD search) ========
  # Standalone Gemini without search grounding. Generous free tier.
  - model_name: gemini
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0

  # Gemini 2.5 Flash Image (Nano Banana) — text-to-image AND image edit
  # (background removal/replace, inpainting, relight). Free: 500 images/day,
  # 1024x1024, accepts input images for edit workflows.
  - model_name: image-edit
    litellm_params:
      model: gemini/gemini-2.5-flash-image
      api_key: os.environ/GEMINI_API_KEY
    model_info:
      input_cost_per_token: 0
      output_cost_per_token: 0
      output_cost_per_image: 0

  # Gemini 2.5 Flash TTS — text-to-speech via /v1/audio/speech.
  # Free: 15 RPM / ~1500 RPD, 4096 chars/req, 24kHz WAV (Linear PCM).
  # 30 voices, multilingual incl. Russian. Default voice "Kore".
  # Two deployments (Gemini + local Piper) rather than a `fallbacks:` chain,
  # because router fallbacks do NOT fire for /v1/audio/speech — with Gemini's
  # quota gone `tts` just 500'd. Deployment choice inside one model_name does
  # work, so the alias degrades to Piper on its own. 0/15 → 13/15.
  # Do NOT add `order:` — it's a strict tier (order-2 is unreachable until every
  # order-1 sibling is in cooldown), which reintroduces the 500s. Weights below.
  # Piper ignores `voice`, so a Gemini voice name passing through is harmless.
  - model_name: tts
    litellm_params:
      model: gemini/gemini-2.5-flash-preview-tts
      api_key: os.environ/GEMINI_API_KEY
      # Gemini's limit is DAILY; the global 60s cooldown just cycles
      # park→expire→500. An hour matches the real limit's shape.
      cooldown_time: 3600
      # 3:7 vs Piper. Cooldown alone left 4/12 failing (all retries can land on
      # the dead sibling); weighting drops that to ~3%. Gemini still gets enough
      # traffic to pick its quota back up tomorrow by itself.
      weight: 3
    model_info:
      mode: audio_speech
      input_cost_per_token: 0
      output_cost_per_token: 0
  - model_name: tts
    litellm_params:
      model: openai/tts-1
      api_base: http://host.docker.internal:8177/v1
      api_key: sk-no-key
      weight: 7   # local, unlimited, always up — carries the alias by default
    model_info:
      mode: audio_speech
      input_cost_per_token: 0
      output_cost_per_token: 0

  # Gemini 2.5 Pro TTS — better prosody, same free quota pool, slower.
  - model_name: tts-pro
    litellm_params:
      model: gemini/gemini-2.5-pro-preview-tts
      api_key: os.environ/GEMINI_API_KEY
    model_info:
      mode: audio_speech
      input_cost_per_token: 0
      output_cost_per_token: 0

  # Azure AI Speech (Cognitive Services) — neural TTS via /v1/audio/speech.
  # Resource `tts-greek` in West Europe, pricing tier F0 (free): 500 000
  # characters/month neural, recurring. 400+ voices, 140+ locales (the
  # resource name is historical — voices are NOT region-locked, any neural
  # voice in any locale works through this endpoint).
  # Voice is passed at call time as the `voice` request param.
  # $0 guarantee depends on F0 pricing tier — verified in Azure portal,
  # NOT enforced by verify-free-only.sh (proxy can't see Azure-side config).
  #
  # `tts-azure`: voice-agnostic deployment used by greek-tts skill, which
  # sends explicit Azure voice ids per turn (el-GR-NestorasNeural, etc.).
  - model_name: tts-azure
    litellm_params:
      model: azure/speech/azure-tts
      api_base: https://westeurope.tts.speech.microsoft.com
      api_key: os.environ/AZURE_VOICE_TTS_GREEK_API_KEY1
    model_info:
      mode: audio_speech
      input_cost_per_token: 0
      output_cost_per_token: 0
      # Azure TTS bills per character, not per token — zero that dimension
      # too so spend_logs stay $0 (F0 free tier; per-token zeros don't cover it).
      input_cost_per_character: 0
      output_cost_per_character: 0

  # `tts-azure-ru`: same Azure backend, but `tts_voice_rewriter` callback
  # forces voice → ru-RU-DmitryNeural regardless of incoming `voice`. Wired
  # as the last-resort fallback for `tts` (after tts-piper).
  - model_name: tts-azure-ru
    litellm_params:
      model: azure/speech/azure-tts
      api_base: https://westeurope.tts.speech.microsoft.com
      api_key: os.environ/AZURE_VOICE_TTS_GREEK_API_KEY1
    model_info:
      mode: audio_speech
      input_cost_per_token: 0
      output_cost_per_token: 0
      # Azure TTS bills per character, not per token — zero that dimension
      # too so spend_logs stay $0 (F0 free tier; per-token zeros don't cover it).
      input_cost_per_character: 0
      output_cost_per_character: 0

  # Piper TTS — local Russian TTS via FastAPI shim on the host.
  # Shim at ~/projects/dotfiles/litellm/piper-shim/app.py (launchd,
  # com.servitola.piper-shim, port 8177). Voice param is ignored — the
  # shim always uses ru_RU-irina-medium. Always available, zero quota.
  # First fallback for `tts` when Gemini quota is exhausted.
  - model_name: tts-piper
    litellm_params:
      model: openai/tts-1
      api_base: http://host.docker.internal:8177/v1
      api_key: sk-no-key
    model_info:
      mode: audio_speech
      input_cost_per_token: 0
      output_cost_per_token: 0

  # Kokoro-82M TTS — local ENGLISH TTS via MLX (Apple's fast engine), FastAPI
  # shim at ~/projects/dotfiles/litellm/kokoro-shim/app.py (launchd,
  # com.servitola.kokoro-shim, port 8179). Highest-quality small TTS on Apple
  # Silicon; English-first (Russian stays on tts-piper). Default voice af_heart;
  # the `voice` param accepts Kokoro voices (af_*/am_* American, bf_*/bm_*
  # British), anything else falls back to af_heart. Always available, zero quota.
  - model_name: tts-kokoro
    litellm_params:
      model: openai/tts-1
      api_base: http://host.docker.internal:8179/v1
      api_key: sk-no-key
    model_info:
      mode: audio_speech
      input_cost_per_token: 0
      output_cost_per_token: 0

  # === Speech-to-text =======================================================
  # VoiceInk fork (~/projects/voiceink): whisper.cpp + Metal large-v3-turbo in
  # the always-open app, user dictionary applied. A FastAPI shim
  # (litellm/voiceink-shim/, launchd com.servitola.voiceink-shim, :8178) exposes
  # it as /v1/audio/transcriptions; container reaches it via host.docker.internal.
  # Unlike the OpenAI API: verbose_json/srt/vtt → 400, and prompt / temperature /
  # language / model are accepted but ignored.
  - model_name: voiceink-local
    litellm_params:
      model: openai/whisper-1
      api_base: http://host.docker.internal:8178/v1
      api_key: "not-needed"
    model_info:
      mode: audio_transcription
      input_cost_per_token: 0
      output_cost_per_token: 0

