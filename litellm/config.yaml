router_settings:
  # Fallback policy:
  # - Direct names (gpt, nemotron, …) do NOT fall back between themselves.
  #   If you called `gpt` and it failed → the client sees an error.
  # - Rotation groups (coding, reasoning, fast, vision, web-search) have
  #   several deployments under one model_name. The router does
  #   simple-shuffle; on allowed_fails in a row → cooldown + shuffle to
  #   another. Callers should decide explicitly between "this specific
  #   model" and "any model in this class".
  num_retries: 2
  retry_after: 5
  allowed_fails: 1
  cooldown_time: 60
  routing_strategy: simple-shuffle
  # Before dispatch, drop deployments whose context window can't fit the
  # prompt (and region-filter). For rotation groups this fails over to a
  # bigger-context sibling instead of hard-erroring on long RAG chunks.
  # Deployments with unknown context are left in (never filtered out).
  enable_pre_call_checks: true
  # Per-error retry policy (overrides the blanket num_retries above by class).
  # Don't waste latency retrying a dead/revoked free-tier key (auth) or a
  # malformed request (bad-request) — fail fast to the next deployment.
  # Keep retrying transient 429s and timeouts.
  retry_policy:
    AuthenticationErrorRetries: 0
    BadRequestErrorRetries: 0
    ContentPolicyViolationErrorRetries: 0
    TimeoutErrorRetries: 2
    RateLimitErrorRetries: 2
  # Qwen Code CLI defaults to a model name from ~/.qwen/settings.json
  # (model.name = "coder-model") and/or the names from the official LiteLLM
  # tutorial. Map those onto the `coding` rotation group — which contains
  # Codestral, Llama 4 Scout, Kimi K2.6, gpt-oss, GLM, Gemini, Nemotron Nano.
  # `coder` alias also redirected here (qwen3-coder:free dead since 2026-04).
  model_group_alias:
    coder: coding
    coder-model: coding
    qwen-code: coding
    qwen3-coder-plus: coding
    # `ai` helper's default model is "auto" — keep it routable
    auto: coding
  # Declared TTS fallback chain — but in practice router fallbacks do NOT
  # fire for /v1/audio/speech (observed by the serho bot, see its
  # tts_fallback.py): callers implement the chain client-side, retrying the
  # next alias themselves. `tts-azure-ru` re-dispatches through the proxy,
  # so the `tts_voice_rewriter` pre-call hook fires and replaces the Gemini
  # voice name (Kore/Puck/…) with `ru-RU-DmitryNeural` before the Azure call.
  # On ContextWindowExceededError, escalate to a group with big-context
  # members (reasoning has MiniMax 196k / DeepSeek-V4 1M ctx). Complements
  # enable_pre_call_checks (which filters *before* dispatch; this catches the
  # case where the upstream itself rejects an over-long prompt).
  context_window_fallbacks:
    - coding: ["reasoning"]
    - fast: ["reasoning"]
  fallbacks:
    - tts: ["tts-piper", "tts-azure-ru"]

litellm_settings:
  drop_params: true
  set_verbose: false
  telemetry: false
  # Pre-call hooks (run in order):
  # 1. redact_secrets — strip sk-…, AWS keys, GitHub PATs, JWTs, etc.
  #    before any upstream provider sees the payload AND before it lands
  #    in spend_logs. See redact_secrets.py for the pattern list.
  # 2. tts_voice_rewriter — rewrite the `voice` param on /v1/audio/speech
  #    for fallback-only deployments (tts-azure-ru) so Gemini voice ids
  #    map to valid Azure neural voices. See tts_voice_rewriter.py.
  callbacks:
    - redact_secrets.redact_secrets_instance
    - tts_voice_rewriter.tts_voice_rewriter_instance
  redact_messages_in_exceptions: true
  # Semantic response cache in Redis (RediSearch KNN). A prompt whose
  # embedding is ≥ similarity_threshold (0.85) to a cached one is served
  # from cache — no upstream call, no quota consumed. Cuts cooldown churn
  # on free-tier 429s. TTL 24h (86400s). The embedding model below
  # vectorizes every prompt (mistral-embed, a provider-prefixed string —
  # NOT a model_list alias, since the cache resolver runs before the router).
  cache: true
  cache_params:
    type: redis-semantic
    host: redis
    port: 6379
    ttl: 86400
    similarity_threshold: 0.85
    redis_semantic_cache_embedding_model: mistral/mistral-embed

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # false: config.yaml is the single source of truth. UI model edits would
  # write to Postgres and override config WITHOUT passing verify-free-only.sh
  # (a $0-bypass). DB currently holds 0 stored models, so this is a no-op
  # operationally — it just closes the hole.
  store_model_in_db: false
  store_prompts_in_spend_logs: true
  # Auto-prune spend logs (LiteLLM_SpendLogs grows per-request; with
  # store_prompts_in_spend_logs each row also carries the full prompt+response).
  # Built-in scheduler runs inside the litellm container — no cron needed.
  maximum_spend_logs_retention_period: "10d"   # delete rows older than 10 days
  maximum_spend_logs_retention_interval: "1d"  # run the cleanup job daily
