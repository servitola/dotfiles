# LiteLLM → free model providers (OpenRouter / Groq / NVIDIA NIM / GitHub / Z.AI)

model_list:

  # NVIDIA Nemotron 3 Super 120B — hybrid Mamba-Transformer, 262k context.
  # Fast (~4s), honest routing, good at reasoning / planning.
  - model_name: nemotron
    litellm_params:
      model: openai/nvidia/nemotron-3-super-120b-a12b:free
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY

  # OpenAI gpt-oss 120B — open-weight MoE, 131k context.
  # Fastest in the free pool (~3s), solid tool-use, stable routing.
  - model_name: gpt
    litellm_params:
      model: openai/openai/gpt-oss-120b:free
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY

  # Z.AI GLM-4.7-Flash — 31.2B MoE (3B active), 202k context.
  # Native Z.AI provider, free tier. Strong tool-use, vision, coding.
  - model_name: glm
    litellm_params:
      model: zai/glm-4.7-flash
      api_key: os.environ/ZAI_API_KEY

  # Vision pool — three models under the same name for reliability on
  # image tasks. Shuffle is justified here because vision models rarely
  # overlap in capabilities and rate limits park them in cooldown often.
  - model_name: vision
    litellm_params:
      model: openai/nvidia/nemotron-nano-12b-v2-vl:free
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: vision
    litellm_params:
      model: openai/google/gemma-4-31b-it:free
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: vision
    litellm_params:
      model: openai/google/gemma-4-26b-a4b-it:free
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: vision
    litellm_params:
      model: zai/glm-4.7-flash
      api_key: os.environ/ZAI_API_KEY

  # Embeddings for local RAG / Qdrant.
  # Free OpenRouter embedding model so the same local LiteLLM proxy can serve
  # both retrieval and generation.
  - model_name: embed
    litellm_params:
      model: openai/nvidia/llama-nemotron-embed-vl-1b-v2:free
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY
      num_retries: 3
      timeout: 90

  # === Groq direct (free: 30 RPM / 6K TPM / 14 400 RPD) ===
  # `groq/` prefix — LiteLLM has native provider integration for Groq,
  # so no need for the `openai/<slug>` + api_base workaround. Kept for
  # A/B comparison with Workbot's AIProvider.groq which runs the same
  # upstream via crush instead of LiteLLM.
  - model_name: groq-llama
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
  - model_name: groq-gpt-oss
    litellm_params:
      model: groq/openai/gpt-oss-120b
      api_key: os.environ/GROQ_API_KEY
  - model_name: groq-compound
    litellm_params:
      model: groq/groq/compound
      api_key: os.environ/GROQ_API_KEY

  # === NVIDIA NIM direct (free 1000-5000 credits, 40 RPM) ===
  # Different from the OpenRouter-proxied `nemotron` above: this hits
  # build.nvidia.com directly, no middleman cooldowns, but separate
  # quota pool.
  - model_name: nvidia-nemotron
    litellm_params:
      # 49B v1 was EOL 2026-04-15 → v1.5 is the current snapshot;
      # tuned for agentic workflows, used as default for this alias.
      model: openai/nvidia/llama-3.3-nemotron-super-49b-v1.5
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
  - model_name: nvidia-nemotron-120b
    litellm_params:
      # 120B Mamba-Transformer hybrid flagship for heavier reasoning.
      model: openai/nvidia/nemotron-3-super-120b-a12b
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
  - model_name: nvidia-kimi
    litellm_params:
      model: openai/moonshotai/kimi-k2.5
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
  - model_name: nvidia-deepseek
    litellm_params:
      model: openai/deepseek-ai/deepseek-v3.2
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY

  # === GitHub Models (free 10-15 RPM / 50-150 RPD) ===
  # Tiny quota — only useful for smoke tests, not continuous pipeline.
  # PAT with `models:read` scope required.
  - model_name: github-gpt4o-mini
    litellm_params:
      model: openai/openai/gpt-4o-mini
      api_base: https://models.github.ai/inference
      api_key: os.environ/GITHUB_MODELS_TOKEN
  - model_name: github-deepseek-r1
    litellm_params:
      model: openai/deepseek/DeepSeek-R1
      api_base: https://models.github.ai/inference
      api_key: os.environ/GITHUB_MODELS_TOKEN

  # === Rotation groups =======================================================
  # Use these names when "any working model from the class" is fine — the
  # router does simple-shuffle between deployments, cools down the one that
  # failed (allowed_fails/cooldown_time), and retries against the next

  # coding — good tool-use and structured output
  - model_name: coding
    litellm_params:
      model: openai/moonshotai/kimi-k2.5
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
      order: 1
  - model_name: coding
    litellm_params:
      model: openai/deepseek-ai/deepseek-v3.2
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
      order: 1
  - model_name: coding
    litellm_params:
      model: openai/openai/gpt-oss-120b:free
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY
      order: 2
  - model_name: coding
    litellm_params:
      model: zai/glm-4.7-flash
      api_key: os.environ/ZAI_API_KEY
      order: 2

  # reasoning — planning, analysis, long-context. Nemotron 120B + DeepSeek.
  # NIM and OpenRouter both ~100%.
  - model_name: reasoning
    litellm_params:
      model: openai/nvidia/nemotron-3-super-120b-a12b:free
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY
      order: 1
  - model_name: reasoning
    litellm_params:
      model: openai/nvidia/nemotron-3-super-120b-a12b
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
      order: 1
  - model_name: reasoning
    litellm_params:
      model: openai/deepseek-ai/deepseek-v3.2
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
      order: 2

  # fast — latency-critical (~1-3s). Groq-only, all direct, support tool-calling.
  - model_name: fast
    litellm_params:
      model: groq/openai/gpt-oss-120b
      api_key: os.environ/GROQ_API_KEY
  - model_name: fast
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

router_settings:
  # Fallback policy:
  # - Direct names (gpt, nemotron, …) do NOT fall back between themselves.
  #   If you called `gpt` and it failed → the client sees an error.
  # - Rotation groups (coding, reasoning, fast, vision, premium) have
  #   several deployments under one model_name. The router does
  #   simple-shuffle; on allowed_fails in a row → cooldown + shuffle to
  #   another. Callers should decide explicitly between "this specific
  #   model" and "any model in this class".
  num_retries: 2
  retry_after: 5
  allowed_fails: 1
  cooldown_time: 60
  routing_strategy: simple-shuffle
  # Qwen Code CLI defaults to a model name from ~/.qwen/settings.json
  # (model.name = "coder-model") and/or the names from the official LiteLLM
  # tutorial. Map those onto the `coding` rotation group — which contains
  # Kimi K2.5, DeepSeek V3.2 (NIM, order 1) and gpt-oss + GLM (order 2).
  # `coder` alias also redirected here (qwen3-coder:free dead since 2026-04).
  model_group_alias:
    coder: coding
    coder-model: coding
    qwen-code: coding
    qwen3-coder-plus: coding
    # `ai` helper's default model is "auto" — keep it routable
    auto: coding

litellm_settings:
  drop_params: true
  set_verbose: false
  telemetry: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  store_model_in_db: true
  store_prompts_in_spend_logs: true
