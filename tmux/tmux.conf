# Gruvbox Dark Hard colors
set -g status-style "bg=#3c3836,fg=#ebdbb2"
set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#d79921"
set -g message-style "bg=#3c3836,fg=#ebdbb2"

# True color support
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Mouse support
set -g mouse on

# Increase history
set -g history-limit 50000

# Start windows/panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows on close
set -g renumber-windows on

# Faster escape time (important for vim/neovim)
set -sg escape-time 10

# Focus events (for vim autoread)
set -g focus-events on

# Vi mode for copy
setw -g mode-keys vi
