[notifications]
toast_duration_secs = 8

[notifications.preferences]
is_agent_task_completed_enabled = true
is_long_running_enabled = true
is_needs_attention_enabled = true
is_password_prompt_enabled = true
long_running_threshold = 30
mode = "enabled"
play_notification_sound = true

[appearance]
spacing = "compact"

[appearance.window]
override_opacity = 67
override_blur = 1
zoom_level = 150
open_windows_at_custom_size = false

[appearance.panes]
should_dim_inactive_panes = true
focus_pane_on_hover = false

[appearance.text]
notebook_font_size = 14.0
font_size = 17.0
font_name = "JetBrainsMono Nerd Font Mono"
ui_font_size = 12.0

[appearance.vertical_tabs]
enabled = true
show_panel_in_restored_windows = true
show_title_bar_search_bar = false
use_latest_prompt_as_title = true

[appearance.themes]
theme = "gruvbox_dark"

[terminal]
show_terminal_zero_state_block = false

[general]
show_warning_before_quitting = false

[code]

[code.editor]
open_file_editor = { external_editor = "vs_code" }

[agents]

[agents.voice]
voice_input_enabled = false

