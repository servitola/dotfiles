router_settings:
  # Fallback policy:
  # - Direct names (gpt, nemotron, …) do NOT fall back between themselves.
  #   If you called `gpt` and it failed → the client sees an error.
  # - Rotation groups (coding, reasoning, fast, vision, web-search) have
  #   several deployments under one model_name. The router does
  #   simple-shuffle; on allowed_fails in a row → cooldown + shuffle to
  #   another. Callers should decide explicitly between "this specific
  #   model" and "any model in this class".
  num_retries: 2
  retry_after: 5
  allowed_fails: 1
  cooldown_time: 60
  routing_strategy: simple-shuffle
  # Before dispatch, drop deployments whose context window can't fit the
  # prompt (and region-filter). For rotation groups this fails over to a
  # bigger-context sibling instead of hard-erroring on long RAG chunks.
  # Deployments with unknown context are left in (never filtered out).
  enable_pre_call_checks: true
  # Per-error retry policy (overrides the blanket num_retries above by class).
  # Don't waste latency retrying a dead/revoked free-tier key (auth) or a
  # malformed request (bad-request) — fail fast to the next deployment.
  # Keep retrying transient 429s and timeouts.
  retry_policy:
    AuthenticationErrorRetries: 0
    BadRequestErrorRetries: 0
    ContentPolicyViolationErrorRetries: 0
    TimeoutErrorRetries: 2
    RateLimitErrorRetries: 2
  # Per-error-class cooldowns: the blanket allowed_fails:1 benched a healthy
  # deployment on one routine 429 as fast as it would a dead key, and 429 is
  # the normal steady state here. Tolerate rate limits, park real faults now.
  allowed_fails_policy:
    # 2 is measured, not guessed: at 5 a daily-exhausted deployment stays in
    # rotation long enough to sink the alias (tts hit 2/8); at 1 ordinary
    # burst-429s cause needless churn.
    RateLimitErrorAllowedFails: 2
    TimeoutErrorAllowedFails: 3
    AuthenticationErrorAllowedFails: 0 # dead/revoked key — park at once
    BadRequestErrorAllowedFails: 0     # dead slug (404) — park at once
    ContentPolicyViolationErrorAllowedFails: 100  # a refusal is not a fault
  # On a same-group deployment failure, retry weighted peers within the SAME
  # model_name before escalating to a cross-group fallback. Matters now that
  # rotation groups carry explicit `weight`s.
  enable_weighted_failover: true
  # Qwen Code CLI defaults to a model name from ~/.qwen/settings.json
  # (model.name = "coder-model") and/or the names from the official LiteLLM
  # tutorial. Map those onto the `coding` rotation group.
  # `coder` alias also redirected here (qwen3-coder:free dead since 2026-04).
  model_group_alias:
    coder: coding
    coder-model: coding
    qwen-code: coding
    qwen3-coder-plus: coding
    # `ai` helper's default model is "auto" — keep it routable
    auto: coding
  # The tts chain below is belt-and-braces only: router fallbacks do NOT fire
  # for /v1/audio/speech, so `tts` carries Piper as an in-alias sibling instead
  # (see it above) and the serho bot still retries client-side (tts_fallback.py).
  # Escalate over-long prompts to a big-context group; complements
  # enable_pre_call_checks, which filters before dispatch rather than after.
  context_window_fallbacks:
    - coding: ["reasoning"]
    - fast: ["reasoning"]
  # Rotation groups only — these chain between *classes* of model, so a
  # fallback still answers the question asked. Direct provider aliases keep no
  # fallback by design: ask for `groq-llama` and you get it or an error.
  fallbacks:
    - tts: ["tts-piper", "tts-azure-ru"]
    - coding: ["fast", "reasoning"]
    - reasoning: ["coding"]
    - fast: ["coding"]
    - vision: ["gemini-flash-lite"]
  # A refusal from the low-refusal group should try its sibling class, not
  # surface as an error.
  content_policy_fallbacks:
    - uncensored: ["glm"]

litellm_settings:
  drop_params: true
  set_verbose: false
  telemetry: false
  # Pre-call hooks (run in order):
  # 1. redact_secrets — strip sk-…, AWS keys, GitHub PATs, JWTs, etc.
  #    before any upstream provider sees the payload AND before it lands
  #    in spend_logs. See redact_secrets.py for the pattern list.
  # 2. tts_voice_rewriter — rewrite the `voice` param on /v1/audio/speech
  #    for fallback-only deployments (tts-azure-ru) so Gemini voice ids
  #    map to valid Azure neural voices. See tts_voice_rewriter.py.
  # 3. prometheus — GET /metrics, no extra container. `curl -s
  #    localhost:4000/metrics | grep litellm_deployment_` shows per-deployment
  #    success/failure and *_fallbacks, the only empirical proof the fallback
  #    chains fire. No Grafana needed at this scale.
  callbacks:
    - redact_secrets.redact_secrets_instance
    - tts_voice_rewriter.tts_voice_rewriter_instance
    - prometheus
  redact_messages_in_exceptions: true
  # Exact-match, NOT redis-semantic. Semantic keyed on the prompt embedding
  # only — not the model — so one prompt served four different aliases the
  # same cached answer, invisibly (LiteLLM rewrites `model` in the response).
  # Safety verdicts could come from a chat model. Full writeup + the
  # regression test in AGENTS.md; re-enable semantic only after reading it.
  # Exact keys hash the whole body, which also retires the old 0.92-threshold
  # and vision/image-bytes workarounds. Costs paraphrase hits; worth it.
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    ttl: 86400
    # Never cache embeddings or audio — /v1/embeddings feeds Qdrant (a stale or
    # cross-model vector silently corrupts a collection) and TTS output is
    # per-voice binary. Chat completions are the only safe thing to cache.
    supported_call_types: ["acompletion", "atext_completion"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # false: config.yaml is the single source of truth. UI model edits would
  # write to Postgres and override config WITHOUT passing verify-free-only.sh
  # (a $0-bypass). DB currently holds 0 stored models, so this is a no-op
  # operationally — it just closes the hole.
  store_model_in_db: false
  store_prompts_in_spend_logs: true
  # Auto-prune spend logs (LiteLLM_SpendLogs grows per-request; with
  # store_prompts_in_spend_logs each row also carries the full prompt+response).
  # Built-in scheduler runs inside the litellm container — no cron needed.
  maximum_spend_logs_retention_period: "10d"   # delete rows older than 10 days
  maximum_spend_logs_retention_interval: "1d"  # run the cleanup job daily
